<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عقارات آرام محمد</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.3);
        }

        .logo-container svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        h1 {
            font-size: 24px;
            color: #1e3c72;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 30px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            color: #2a5298;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .link-btn:hover {
            background-color: #1e3c72;
            color: #ffffff;
            border-color: #1e3c72;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(30, 60, 114, 0.2);
        }

        .link-btn:active {
            transform: translateY(-1px);
        }

        .icon-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-right svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .arrow-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            opacity: 0.6;
            transform: scaleX(-1);
        }

        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
